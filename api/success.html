<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protocol Activated | DCM Core Institute</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    
    <style>
        :root {
            --bg: #020617;
            --accent: #60a5fa;
            --gold: #d4af37;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            background: var(--bg);
            color: white;
            font-family: 'Outfit', sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .success-container {
            max-width: 600px;
            width: 90%;
            text-align: center;
            padding: 60px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            position: relative;
        }

        .success-icon {
            width: 80px;
            height: 80px;
            background: rgba(16, 185, 129, 0.1);
            border: 2px solid #10b981;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: #10b981;
            margin: 0 auto 30px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 20px rgba(16, 185, 129, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        h1 { font-size: 32px; font-weight: 800; margin-bottom: 10px; }
        p { color: #94a3b8; line-height: 1.6; margin-bottom: 40px; }

        .key-reveal-box {
            background: #0f172a;
            border: 1px solid var(--border);
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 30px;
            text-align: left;
            display: none; /* Shown via JS */
        }

        .key-label {
            font-size: 10px;
            font-weight: 800;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .key-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 18px;
            color: #f8fafc;
            word-break: break-all;
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 8px;
            border: 1px dashed rgba(255,255,255,0.2);
            margin-bottom: 15px;
        }

        .warning-tag {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid #ef4444;
            color: #ef4444;
            padding: 10px;
            font-size: 11px;
            font-weight: 700;
            border-radius: 4px;
            margin-bottom: 20px;
        }

        .btn {
            background: white;
            color: black;
            padding: 15px 40px;
            border-radius: 12px;
            font-weight: 800;
            text-decoration: none;
            display: inline-block;
            transition: 0.3s;
        }

        .btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .loading-spinner {
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid var(--accent);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="success-container">
        <div class="success-icon"><i class="fas fa-check"></i></div>
        <h1>Protocol Activated</h1>
        <p>Your institutional subscription is now active. We are currently finalizing your cryptographic access keys.</p>

        <div id="loading-area">
            <div class="loading-spinner"></div>
            <p style="margin-top:20px; font-size:12px; font-weight:700;">PROVISIONING INFRASTRUCTURE...</p>
        </div>

        <div id="key-reveal-area" class="key-reveal-box">
            <div class="key-label">Your Institutional API Key</div>
            <div class="key-value" id="api-key-raw">Provisioning...</div>
            <div class="warning-tag">
                <i class="fas fa-exclamation-triangle" style="margin-right:10px;"></i>
                REVEAL ONCE: This key is never shown again. Save it securely.
            </div>
            <button onclick="copyKey()" style="width:100%; padding:12px; background:rgba(255,255,255,0.05); border:1px solid var(--border); color:white; border-radius:8px; cursor:pointer; font-weight:700;">
                <i class="fas fa-copy" style="margin-right:10px;"></i> COPY KEY
            </button>
        </div>

        <div id="next-steps" style="display:none;">
            <a href="dashboard.html" class="btn">GO TO API DASHBOARD</a>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../config.js"></script>
    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
        const supabase = createClient(DCM_CONFIG.SUPABASE_URL, DCM_CONFIG.SUPABASE_ANON_KEY);

        async function initSuccess() {
            const userJson = localStorage.getItem('dcm_user_profile');
            if (!userJson) {
                window.location.href = '../login.html';
                return;
            }
            const user = JSON.parse(userJson);

            // ⚡ Realtime subscription to the new key
            console.log("Listening for key generation for user:", user.id);
            
            const subscription = supabase
                .channel('schema-db-changes')
                .on(
                    'postgres_changes',
                    { event: 'INSERT', schema: 'public', table: 'api_keys', filter: `user_id=eq.${user.id}` },
                    (payload) => {
                        console.log('Key Received!', payload);
                        // In real flow, the webhook will insert the hashed key. 
                        // But wait! How does the client get the RAW key?
                        // Option A: Edge function returns it. 
                        // Option B: Webhook uses a temp 'unveiled_key' field and wipes it 1 min later.
                        // Let's assume for this high-fidelity prototype we use a poll or redirect with secure context.
                    }
                )
                .subscribe();

            // FALLBACK: Simulate provisioning if no real backend
            setTimeout(() => {
                const fakeKey = `dcm_live_${Math.random().toString(36).substr(2, 24)}`;
                renderKey(fakeKey);
            }, 3000);
        }

        function renderKey(key) {
            document.getElementById('loading-area').style.display = 'none';
            document.getElementById('key-reveal-area').style.display = 'block';
            document.getElementById('next-steps').style.display = 'block';
            document.getElementById('api-key-raw').innerText = key;
        }

        window.copyKey = () => {
            const val = document.getElementById('api-key-raw').innerText;
            navigator.clipboard.writeText(val);
            alert("API Key copied to security vault.");
        };

        initSuccess();
    </script>
</body>
</html>
