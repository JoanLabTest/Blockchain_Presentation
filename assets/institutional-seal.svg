<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Golden Outer Glow -->
    <circle cx="100" cy="100" r="95" fill="none" stroke="#c9a84c" stroke-width="0.5" stroke-dasharray="2 4" opacity="0.6"/>
    
    <!-- Main Ribbon Circle -->
    <circle cx="100" cy="100" r="85" fill="#020617" stroke="#c9a84c" stroke-width="4"/>
    <circle cx="100" cy="100" r="78" fill="none" stroke="#c9a84c" stroke-width="1" opacity="0.4"/>

    <!-- Logo Orb (Center) -->
    <defs>
        <radialGradient id="grad-seal" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#c9a84c"/>
            <stop offset="100%" stop-color="#8e6d1c"/>
        </radialGradient>
    </defs>
    <circle cx="100" cy="100" r="40" fill="url(#grad-seal)" opacity="0.9"/>
    <path d="M100 75L115 110H85L100 75Z" fill="#020617"/> <!-- Simplified DCM Triangle -->

    <!-- Circular Text Path -->
    <defs>
        <path id="circlePath" d="M 100, 100 m -65, 0 a 65,65 0 1,1 130,0 a 65,65 0 1,1 -130,0" />
    </defs>
    <text font-family="'Urbanist',sans-serif" font-size="12" fill="#c9a84c" letter-spacing="4">
        <textPath xlink:href="#circlePath" startOffset="0%">
            * DCM CORE INSTITUTE * 2026 AUDITED STANDARD *
        </textPath>
    </text>

    <!-- Inner Decorative Accents -->
    <path d="M100 145V155M100 45V55M145 100H155M45 100H55" stroke="#c9a84c" stroke-width="2" stroke-linecap="round"/>
</svg>
