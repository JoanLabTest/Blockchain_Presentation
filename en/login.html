    <script>
        (async function () {
            try {
                // Check if we have a session locally (fast)
                const { data: { session } } = await window.supabase.auth.getSession();
    if (session && session.user) {
                    // 🛡️ STRICT CHECK: Verify with server before redirecting to avoid loop
                    const { data: { user }, error } = await window.supabase.auth.getUser();
    if (user && !error) {
                        // All good — redirect silently while page is still invisible
                        window.location.replace('dashboard.html');
                        return;
                    } else {
                        console.warn('🔒 Stale session detected on login page. Clearing state.');
                        await window.supabase.auth.signOut();
                    }
                }
            } catch (e) {
                console.warn('Session check failed on login page:', e);
            }
            // No valid active session — reveal the login page with a smooth fade-in
            document.documentElement.style.opacity = '1';
        })();

    <!-- AUTH LOGIC -->
    <script>
        // Use the login-page Supabase client
        const _sb = () => window.supabase;

        // STATE
        let isSignup = false;

        // ELEMENTS
        const form = document.getElementById('auth-form');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const confirmPasswordInput = document.getElementById('confirm-password');
        const firstnameInput = document.getElementById('firstname');
        const lastnameInput = document.getElementById('lastname');
        const firstnameGroup = document.getElementById('firstname-group');
        const lastnameGroup = document.getElementById('lastname-group');
        const confirmPasswordGroup = document.getElementById('confirm-password-group');
        const submitBtn = document.getElementById('submit-btn');
        const btnText = document.getElementById('btn-text');
        const messageDiv = document.getElementById('auth-message');
        const tabLogin = document.getElementById('tab-login');
        const tabSignup = document.getElementById('tab-signup');

        // TABS
        tabLogin.addEventListener('click', () => toggleMode(false));
        tabSignup.addEventListener('click', () => toggleMode(true));

        function toggleMode(signupMode) {
            isSignup = signupMode;
            if (isSignup) {
                tabLogin.classList.remove('active'); tabSignup.classList.add('active');
                btnText.innerText = 'Créer un compte';
                submitBtn.style.background = 'linear-gradient(135deg, var(--accent-purple), var(--accent-blue))';
                firstnameGroup.style.display = 'block'; lastnameGroup.style.display = 'block';
                confirmPasswordGroup.style.display = 'block';
                firstnameInput.required = true; lastnameInput.required = true; confirmPasswordInput.required = true;
            } else {
                tabSignup.classList.remove('active'); tabLogin.classList.add('active');
                btnText.innerText = 'Se connecter';
                submitBtn.style.background = 'linear-gradient(135deg, var(--accent-blue), var(--accent-cyan))';
                firstnameGroup.style.display = 'none'; lastnameGroup.style.display = 'none';
                confirmPasswordGroup.style.display = 'none';
                firstnameInput.required = false; lastnameInput.required = false; confirmPasswordInput.required = false;
            }
            showMessage('', '');
        }

        // SUBMIT
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            const confirmPassword = confirmPasswordInput.value;

            if (isSignup && password !== confirmPassword) {
                showMessage('Les mots de passe ne correspondent pas.', 'error'); return;
            }

            const sb = _sb();
            if (!sb) { showMessage('Service d\'authentification indisponible.', 'error'); return; }

            setLoading(true); showMessage('', '');

            try {
                if (isSignup) {
                    const firstname = firstnameInput.value.trim();
                    const lastname = lastnameInput.value.trim();
                    const { data, error } = await sb.auth.signUp({
                        email, password,
                        options: { data: { first_name: firstname, last_name: lastname, full_name: `${firstname} ${lastname}` } }
                    });
                    if (error) throw error;

                    if (data.session) {
                        localStorage.setItem('dcm_auth_token', data.session.access_token);
                        localStorage.setItem('dcm_user_profile', JSON.stringify({
                            id: data.user.id,
                            name: `${firstname} ${lastname}`.trim() || email.split('@')[0],
                            email: data.user.email, role: 'Analyste', subscription_tier: 'free'
                        }));
                        showMessage('Compte créé ! Redirection...', 'success');
                        setTimeout(() => window.location.href = 'dashboard.html', 1200);
                    } else {
                        showMessage('Compte créé ! 📩 Vérifiez vos emails pour activer votre compte.', 'success');
                        form.reset();
                    }
                } else {
                    const { data, error } = await sb.auth.signInWithPassword({ email, password });
                    if (error) throw error;

                    localStorage.setItem('dcm_auth_token', data.session.access_token);
                    localStorage.setItem('dcm_user_profile', JSON.stringify({
                        id: data.user.id,
                        name: data.user.user_metadata?.full_name || email.split('@')[0],
                        email: data.user.email, role: 'Analyste', subscription_tier: 'free'
                    }));
                    showMessage('Connexion réussie ! Redirection...', 'success');
                    setTimeout(() => window.location.href = 'dashboard.html', 900);
                }
            } catch (err) {
                console.error('Auth Error Full Object:', err);
                let msg = err.message || 'Une erreur est survenue lors de l\'authentification.';

                if (msg.includes('Invalid login credentials')) msg = 'Email ou mot de passe incorrect.';
                else if (msg.includes('Email not confirmed')) msg = 'Vérifiez vos emails pour activer votre compte avant de vous connecter.';
                else if (msg.includes('rate limit') || msg.includes('Too many requests')) msg = 'Trop de tentatives. Réessayez dans quelques minutes.';
                else if (msg.toLowerCase().includes('database error')) {
                    msg = 'Erreur technique (Base de données). Veuillez contacter le support.';
                }

                showMessage(msg, 'error');
            }
            finally {
                setLoading(false);
            }
        });

        function setLoading(loading) {
            submitBtn.disabled = loading;
            if (loading) { submitBtn.classList.add('loading'); btnText.innerText = 'Chargement...'; }
            else { submitBtn.classList.remove('loading'); btnText.innerText = isSignup ? 'Créer un compte' : 'Se connecter'; }
        }

        function showMessage(text, type) {
            if (!text) { messageDiv.style.display = 'none'; return; }
            messageDiv.innerText = text; messageDiv.className = type; messageDiv.style.display = 'block';
        }

        // GUEST MODE
        window.enterGuestMode = function () {
            const guestProfile = { name: 'Invité', role: 'Visiteur', jurisdiction: 'Global', subscription_tier: 'free' };
            localStorage.setItem('dcm_auth_token', 'guest-token-' + Date.now());
            localStorage.setItem('dcm_user_profile', JSON.stringify(guestProfile));
            showMessage('Mode Invité activé. Redirection...', 'success');
            setTimeout(() => window.location.href = 'dashboard.html', 800);
        };

        // RESET PASSWORD
        window.showResetPassword = function () {
            document.getElementById('auth-form').style.display = 'none';
            document.getElementById('reset-modal').style.display = 'block';
            document.querySelector('.auth-tabs').style.display = 'none';
        };
        window.hideResetPassword = function () {
            document.getElementById('auth-form').style.display = 'block';
            document.getElementById('reset-modal').style.display = 'none';
            document.querySelector('.auth-tabs').style.display = 'flex';
        };
        window.handleReset = async function () {
            const email = document.getElementById('reset-email').value;
            if (!email) return alert('Veuillez entrer un email.');
            try {
                // Use the GitHub Pages production URL for the redirectTo
                const redirectTo = 'https://joanlabtest.github.io/blockchain-presentation/update-password.html';
                const { error } = await window.supabase.auth.resetPasswordForEmail(email, { redirectTo });
                if (error) throw error;
                alert('📧 Email de réinitialisation envoyé !');
                hideResetPassword();
            } catch (err) { alert('Erreur: ' + err.message); }
        };
    </script>
