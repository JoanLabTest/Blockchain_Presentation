<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet"/>
<style>
        :root {
            --bg: #020617;
            --bg-card: #0f172a;
            --accent-blue: #3b82f6;
            --accent-purple: #a855f7;
            --text: #f8fafc;
            --border: #1e293b;
        }
    body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
    .intake-container {
            width: 100%;
            max-width: 600px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 40px 100px -30px rgba(0, 0, 0, 0.8);
        }
    .header {
            text-align: center;
            margin-bottom: 40px;
        }
    .badge {
            display: inline-block;
            background: rgba(59, 130, 246, 0.1);
            color: var(--accent-blue);
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }
    h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 32px;
            font-weight: 800;
            margin: 0;
        }
    p {
            color: #94a3b8;
            line-height: 1.6;
            margin-top: 10px;
        }
    .form-group {
            margin-bottom: 25px;
        }
    label {
            display: block;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #cbd5e1;
        }
    input,
        select,
        textarea {
            width: 100%;
            background: rgba(2, 6, 23, 0.5);
            border: 1px solid var(--border);
            padding: 12px 15px;
            border-radius: 8px;
            color: white;
            font-size: 15px;
            box-sizing: border-box;
            transition: 0.3s;
        }
    input:focus,
        select:focus,
        textarea:focus {
            border-color: var(--accent-blue);
            outline: none;
            background: #020617;
        }
    .btn-submit {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
    .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px var(--accent-blue);
        }
    .trust-line {
            margin-top: 30px;
            text-align: center;
            font-size: 12px;
            color: #64748b;
            border-top: 1px solid var(--border);
            padding-top: 20px;
        }
    .trust-line i {
            margin-right: 5px;
            color: var(--accent-blue);
        }
    </style>
<meta content="Explore the pilot intake module of the DCM Digital Governance OS." name="description"/><script type="application/ld+json">{
  "@context": "https://schema.org",

}</script>

<body>
<div class="intake-container">
<div class="header">
<div class="badge">PROGRAMME PILOTE 2026</div>
<h1>Scale institutional trust.</h1>
<p>Postulez pour rejoindre les 5 premières institutions utilisant le DCM Decision Intelligence Engine en
                conditions réelles.</p>
</div>
<form onsubmit="handleSubmit(event)">
<div class="form-group">
<label>Nom de l'Institution</label>
<input placeholder="Ex: Global Bank Ltd." required="" type="text"/>
</div>
<div class="form-group">
<label>Secteur Réglementaire</label>
<select required="">
<option value="">Sélectionnez...</option>
<option value="banking">Secteur Bancaire (Standard)</option>
<option value="asset_management">Asset Management</option>
<option value="casp">CASP (Crypto-Asset Service Provider)</option>
<option value="consultancy">Audit &amp; Conseil Stratégique</option>
</select>
</div>
<div class="form-group">
<label>Taille d'Actifs sous Gestion (AUM)</label>
<select required="">
<option value="tier3">
                        &lt; $100M</option>
<option value="tier2">$100M - $1B</option>
<option value="tier1">&gt; $1B (Institution Systemic)</option>
</select>
</div>
<div class="form-group">
<label>Objectif Principal du Pilote</label>
<textarea placeholder="Ex: Automatiser le reporting MiCA sur nos fonds tokenisés..." rows="3"></textarea>
</div>
<button class="btn-submit" type="submit">Soumettre la Candidature</button>
</form>
<div class="trust-line">
<i class="fas fa-shield-alt"></i> Vos données sont traitées selon les standards RGPD et encryptées SHA-256.
        </div>
</div>
<script>
        function handleSubmit(e) {
            e.preventDefault();
            alert('Candidature envoyée avec succès. Notre équipe Institutional Relations vous recontactera sous 48h.');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
