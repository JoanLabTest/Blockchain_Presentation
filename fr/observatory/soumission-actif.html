<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <meta content="Portail institutionnel de soumission d'actifs pour le Global Tokenized Securities Registry (GTSR). Enregistrez vos actifs financiers programmables." name="description" />
    <title>Soumission d'Actif Institutionnel | GTSR | DCM Core Institute</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com?display=swap" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet" />

    <!-- AOS -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />

    <style>
        :root {
            --accent-obs: #3b82f6;
            --accent-gold: #c9a84c;
            --accent-purple: #8b5cf6;
            --glass-bg: rgba(15, 23, 42, 0.8);
            --glass-border: rgba(255, 255, 255, 0.08);
            --bg-dark: #020617;
        }

        body {
            background-color: var(--bg-dark);
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-image: radial-gradient(circle at 20% 20%, rgba(59, 130, 246, 0.05) 0%, transparent 40%),
                              radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.05) 0%, transparent 40%);
        }

        .submission-container {
            width: 100%;
            max-width: 800px;
            padding: 40px 20px;
            z-index: 10;
        }

        .form-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 60px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        .form-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--accent-obs), var(--accent-purple));
        }

        .form-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .form-step {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent-obs);
            margin-bottom: 10px;
            display: block;
        }

        .form-title {
            font-family: 'Outfit';
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 15px;
            letter-spacing: -1px;
        }

        .form-desc {
            color: #94a3b8;
            font-size: 15px;
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: 30px;
        }

        .form-label {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 12px;
        }

        .form-label i {
            color: var(--accent-obs);
            font-size: 14px;
        }

        .form-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 16px 20px;
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            transition: 0.3s;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent-obs);
            background: rgba(59, 130, 246, 0.05);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.1);
        }

        .form-input::placeholder {
            color: #475569;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .submit-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(90deg, #3b82f6, #6366f1);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-family: 'Outfit';
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.3);
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(59, 130, 246, 0.5);
            filter: brightness(1.1);
        }

        .back-link {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #64748b;
            text-decoration: none;
            font-size: 13px;
            margin-bottom: 30px;
            transition: 0.3s;
        }

        .back-link:hover {
            color: #fff;
        }

        @media (max-width: 768px) {
            .form-card {
                padding: 40px 25px;
            }
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="submission-container">
        <a href="registre-titres-tokenises.html" class="back-link" data-aos="fade-right">
            <i class="fas fa-arrow-left"></i> Retour au Registre GTSR
        </a>

        <div class="form-card" data-aos="zoom-in">
            <div class="form-header">
                <span class="form-step">Étape 1 sur 4</span>
                <h1 class="form-title">Nouvelle Soumission d'Actif</h1>
                <p class="form-desc">
                    Veuillez fournir les détails institutionnels requis pour l'onboarding de votre actif numérique dans le registre GTSR.
                </p>
            </div>

            <form>
                <div class="form-group">
                    <label class="form-label"><i class="fas fa-file-contract"></i> Nom de l'Actif</label>
                    <input type="text" class="form-input" placeholder="ex: Vanguard Total Stock Market ETF Token" required>
                </div>

                <div class="form-group">
                    <label class="form-label"><i class="fas fa-building-columns"></i> Émetteur</label>
                    <input type="text" class="form-input" placeholder="ex: Vanguard Group, Inc." required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label"><i class="fas fa-layer-group"></i> Ledger Blockchain</label>
                        <select class="form-input" style="appearance: none;">
                            <option value="">Sélectionner un réseau...</option>
                            <option value="eth">Ethereum Mainnet</option>
                            <option value="pol">Polygon PoS</option>
                            <option value="str">Stellar Network</option>
                            <option value="apl">Avalanche</option>
                            <option value="sol">Solana</option>
                            <option value="other">Autre (Préciser)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label"><i class="fas fa-barcode"></i> TFIN ID Proposé</label>
                        <input type="text" class="form-input" placeholder="ex: TFIN-DEBT-ETH-2024-XXXX">
                    </div>
                </div>

                <div class="form-group" style="margin-top: 10px;">
                    <label style="display: flex; align-items: flex-start; gap: 12px; cursor: pointer;">
                        <input type="checkbox" style="margin-top: 4px;" required>
                        <span style="font-size: 13px; color: #94a3b8; line-height: 1.5;">
                            Je confirme que ces données sont exactes et que je suis autorisé à soumettre cet actif au nom de l'entité émettrice.
                        </span>
                    </label>
                </div>

                <button type="submit" class="submit-btn" onclick="event.preventDefault(); alert('Soumission en phase Beta : Les données ont été envoyées pour revue académique.');">
                    Soumettre l'Actif pour Revue <i class="fas fa-paper-plane"></i>
                </button>
            </form>
        </div>
        
        <p style="text-align: center; margin-top: 40px; color: #475569; font-size: 12px;">
            © 2026 DCM Core Institute | Registre Mondial des Titres Tokenisés (GTSR)
        </p>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000, once: true });
    </script>
</body>

</html>
