<!DOCTYPE html>
<html lang="fr">

<head>
    <link rel="canonical" href="https://dcmcore.com/fr/update-password.html" />
    <link rel="alternate" hreflang="en" href="https://dcmcore.com/en/update-password.html" />
    <link rel="alternate" hreflang="fr" href="https://dcmcore.com/fr/update-password.html" />
    <link rel="alternate" hreflang="x-default" href="https://dcmcore.com/update-password.html" />

    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>DCM Digital | Nouveau mot de passe</title>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@300;400;600;700;800&display=swap"
        rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet" />
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
    body {
            background: #020617;
            font-family: 'Urbanist', sans-serif;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
    .card {
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
        }
    .logo {
            text-align: center;
            margin-bottom: 32px;
            font-size: 22px;
            font-weight: 800;
        }
    .logo i {
            color: #3b82f6;
            margin-right: 8px;
        }
    h2 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
            text-align: center;
        }
    p.sub {
            font-size: 13px;
            color: #64748b;
            text-align: center;
            margin-bottom: 28px;
        }
    label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1px;
            color: #94a3b8;
            text-transform: uppercase;
            margin-bottom: 6px;
        }
    input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 13px 16px;
            color: white;
            font-size: 15px;
            font-family: 'Urbanist', sans-serif;
            outline: none;
            transition: border-color 0.2s;
            margin-bottom: 18px;
        }
    input:focus {
            border-color: #3b82f6;
        }
    button {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, #3b82f6, #06b6d4);
            color: white;
            font-weight: 800;
            font-size: 15px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
    button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    #message {
            margin-top: 16px;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            text-align: center;
            display: none;
        }
    #message.success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid #10b981;
            color: #10b981;
        }
    #message.error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid #ef4444;
            color: #ef4444;
        }
    .back {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #64748b;
        }
    .back a {
            color: #3b82f6;
            text-decoration: none;
        }
    #loading-state {
            text-align: center;
            padding: 20px 0;
            color: #64748b;
        }
    #error-state {
            text-align: center;
            padding: 20px 0;
        }
    #error-state p {
            color: #ef4444;
            margin-bottom: 16px;
            font-size: 13px;
        }
    #error-state a {
            color: #3b82f6;
            font-size: 13px;
        }
    </style>
    </head>

<body>
    <div class="card">
        <div class="logo"><i class="fas fa-cube"></i> DCM <span style="font-weight:400; color:#64748b;">DIGITAL</span>
        </div>

        <!-- Loading while parsing token -->
        <div id="loading-state">
            <i class="fas fa-spinner fa-spin" style="font-size:24px; color:#3b82f6;"></i>
            <p style="margin-top:12px;">Vérification du lien...</p>
        </div>

        <!-- Error: no valid token -->
        <div id="error-state" style="display:none;">
            <i class="fas fa-exclamation-triangle" style="font-size:32px; color:#ef4444; margin-bottom:12px;"></i>
            <p>Lien invalide ou expiré.</p>
            <a href="login.html">← Retourner à la connexion</a>
        </div>

        <!-- Password form (shown when token is valid) -->
        <div id="form-state" style="display:none;">
            <h2>Nouveau mot de passe</h2>
            <p class="sub">Choisissez un mot de passe sécurisé pour votre compte.</p>
            <form id="reset-form" onsubmit="handleSubmit(event)">
                <label>NOUVEAU MOT DE PASSE</label>
                <input id="new-password" type="password" placeholder="Min. 8 caractères" required minlength="8" />
                <label>CONFIRMER LE MOT DE PASSE</label>
                <input id="confirm-password" type="password" placeholder="Répétez le mot de passe" required
                    minlength="8" />
                <button id="submit-btn" type="submit">
                    <i class="fas fa-lock"></i> Enregistrer le nouveau mot de passe
                </button>
            </form>
            <div id="message"></div>
            <div class="back"><a href="login.html">← Retour à la connexion</a></div>
        </div>
    </div>

    <!-- Supabase UMD -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="config.js?v=3"></script>
    <script>
        const SUPABASE_URL = (window.DCM_CONFIG && window.DCM_CONFIG.supabaseUrl)
            ? window.DCM_CONFIG.supabaseUrl
            : 'https://wnwerjuqtrduqkgwdjrg.supabase.co';
        const SUPABASE_KEY = (window.DCM_CONFIG && window.DCM_CONFIG.supabaseKey)
            ? window.DCM_CONFIG.supabaseKey
            : 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indud2VyanVxdHJkdXFrZ3dkanJnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA3Mzg3OTEsImV4cCI6MjA4NjMxNDc5MX0.0WqMQs84PFAHuoMQT8xiAZYpWN5b2XGeumtaNzRHcoo';

        const _sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Parse hash params from URL: #access_token=...&type=recovery
        function parseHash() {
            const hash = window.location.hash.substring(1); // remove '#'
            const params = {};
            hash.split('&').forEach(pair => {
                const [k, v] = pair.split('=');
                if (k) params[decodeURIComponent(k)] = decodeURIComponent(v || '');
            });
            return params;
        }

        async function init() {
            const params = parseHash();
            const accessToken = params['access_token'];
            const type = params['type'];
            const refreshToken = params['refresh_token'];

            if (!accessToken || type !== 'recovery') {
                // Check if Supabase already set the session via onAuthStateChange
                const { data: { session } } = await _sb.auth.getSession();
                if (!session) {
                    document.getElementById('loading-state').style.display = 'none';
                    document.getElementById('error-state').style.display = 'block';
                    return;
                }
            } else {
                // Set the session from the recovery token
                try {
                    const { error } = await _sb.auth.setSession({
                        access_token: accessToken,
                        refresh_token: refreshToken || ''
                    });
                    if (error) throw error;
                } catch (e) {
                    console.warn('setSession error:', e);
                    // Supabase may have already set session via onAuthStateChange, continue
                }
            }

            document.getElementById('loading-state').style.display = 'none';
            document.getElementById('form-state').style.display = 'block';
        }

        async function handleSubmit(e) {
            e.preventDefault();
            const newPwd = document.getElementById('new-password').value;
            const confirmPwd = document.getElementById('confirm-password').value;
            const btn = document.getElementById('submit-btn');
            const msg = document.getElementById('message');

            if (newPwd !== confirmPwd) {
                msg.innerText = 'Les mots de passe ne correspondent pas.';
                msg.className = 'error'; msg.style.display = 'block'; return;
            }
            if (newPwd.length < 8) {
                msg.innerText = 'Le mot de passe doit contenir au moins 8 caractères.';
                msg.className = 'error'; msg.style.display = 'block'; return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Enregistrement...';
            msg.style.display = 'none';

            try {
                const { error } = await _sb.auth.updateUser({ password: newPwd });
                if (error) throw error;

                msg.innerText = '✅ Mot de passe mis à jour ! Redirection vers la connexion...';
                msg.className = 'success'; msg.style.display = 'block';

                // Clear any stale tokens and redirect to login
                localStorage.removeItem('dcm_auth_token');
                localStorage.removeItem('dcm_user_profile');
                setTimeout(() => window.location.href = 'login.html', 2000);
            } catch (err) {
                console.error('Update password error:', err);
                msg.innerText = 'Erreur : ' + err.message;
                msg.className = 'error'; msg.style.display = 'block';
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-lock"></i> Enregistrer le nouveau mot de passe';
            }
        }

        // Supabase will also fire PASSWORD_RECOVERY event
        _sb.auth.onAuthStateChange((event, session) => {
            if (event === 'PASSWORD_RECOVERY' && session) {
                document.getElementById('loading-state').style.display = 'none';
                document.getElementById('form-state').style.display = 'block';
            }
        });

        // Start
        init();
    </script>
</body>

</html>
