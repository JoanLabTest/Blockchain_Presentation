        body {

            font-family: 'Inter', -apple-system, sans-serif;
            display: flex;

            margin: 0;

    .login-box {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);

            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
        }
    .login-box h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }
    .login-box p {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 30px;

    .login-input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            border-radius: 8px;

            outline: none;

            letter-spacing: 2px;
        }
    .login-input:focus {
            border-color: #a855f7;

    .btn-login {
            display: inline-block;
            width: 100%;
            padding: 12px;
            background: #a855f7;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
    .btn-login:hover {
            background: #9333ea;
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.4);
        }
    #error-msg {
            color: #ef4444;
            font-size: 13px;
            margin-top: 15px;
            display: none;
        }

    <div class="login-box" style="position: relative;">
        <div class="lang-switcher-dynamic" style="position: absolute; top: 15px; right: 15px; display: flex; gap: 8px; z-index: 100;">
            <a href="#" style="text-decoration: none; opacity: 1; filter: none;" title="Français"><span style="font-size: 18px;">🇫🇷</span></a>
            <a href="../en/investor-login.html" style="text-decoration: none; opacity: 0.5; filter: grayscale(1); transition: 0.3s;" onmouseover="this.style.opacity='1'; this.style.filter='none'" onmouseout="this.style.opacity='0.5'; this.style.filter='grayscale(1)'" title="English"><span style="font-size: 18px;">🇬🇧</span></a>
        </div>
        <i class="fas fa-lock" style="font-size: 40px; color: #a855f7; margin-bottom: 15px;"></i>
        <h1>Investor Data Room</h1>
        <p>Restricted Access. Please enter the master password provided by the founder.</p>

        <input type="password" id="passwordInput" class="login-input" placeholder="••••••••"
            onkeypress="handleEnter(event)">
        <button class="btn-login" onclick="checkPassword()">Access Data Room</button>

        <div id="error-msg">Incorrect password. Please try again or contact management.</div>
    </div>

    <script>
        const VALID_PASSWORDS = ["SERIES-A", "DCM2026", "GUEST"];

        function checkPassword() {
            const input = document.getElementById('passwordInput').value.toUpperCase();
            const errorMsg = document.getElementById('error-msg');

            if (VALID_PASSWORDS.includes(input)) {
                // Store auth state in sessionStorage (simple security for demo purposes)
                sessionStorage.setItem('dcm_investor_auth', 'true');
                window.location.href = 'investor-relations.html';
            } else {
                errorMsg.style.display = 'block';
                // Shake effect
                const box = document.querySelector('.login-box');
                box.style.transform = 'translateX(-10px)';
                setTimeout(() => box.style.transform = 'translateX(10px)', 100);
                setTimeout(() => box.style.transform = 'translateX(-10px)', 200);
                setTimeout(() => box.style.transform = 'translateX(0)', 300);
            }
        }

        function handleEnter(e) {
            if (e.key === 'Enter') {
                checkPassword();
            }
        }
    </script>
