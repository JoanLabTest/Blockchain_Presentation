<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>DCM Digital | ROI Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet"/>
<style>
        :root {
            --bg: #020617;
            --card: rgba(15, 23, 42, 0.6);
            --accent: #3b82f6;
            --text: #f8fafc;
            --muted: #94a3b8;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Urbanist', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .roi-widget {
            background: var(--card);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 600px;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .widget-title {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 30px;
            text-align: center;
            background: linear-gradient(135deg, #3b82f6, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .input-group {
            margin-bottom: 25px;
        }

        .input-group label {
            display: block;
            font-size: 14px;
            color: var(--muted);
            margin-bottom: 8px;
        }

        .slider {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            outline: none;
            -webkit-appearance: none;
            appearance: none;
        }

        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            background: var(--accent);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
        }

        .result-panel {
            background: rgba(59, 130, 246, 0.1);
            border: 1px dashed var(--accent);
            border-radius: 12px;
            padding: 20px;
            margin-top: 30px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .result-item {
            text-align: center;
        }

        .result-val {
            font-size: 24px;
            font-weight: 700;
            display: block;
        }

        .result-label {
            font-size: 12px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .savings-badge {
            grid-column: span 2;
            background: #10b981;
            color: #020617;
            padding: 10px;
            border-radius: 8px;
            font-weight: 800;
            text-align: center;
            margin-top: 10px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.02);
            }

            100% {
                transform: scale(1);
            }
        }
    </style>
<meta content="Explore the roi calculator module of the DCM Digital Governance OS." name="description"/><link href="https://dcmcore.com/roi-calculator.html" rel="canonical"/><script type="application/ld+json">{
  "@context": "https://schema.org",
  "@type": "WebPage",
  "name": "DCM Digital | ROI Calculator",
  "description": "Explore the roi calculator module of the DCM Digital Governance OS.",
  "url": "https://dcmcore.com/roi-calculator.html"
}</script>
    <script src="js/cookie-consent.js"></script>
    <script src="js/cta-tracker.js"></script>
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta name="referrer" content="strict-origin-when-cross-origin">

    <link rel="alternate" hreflang="fr" href="https://dcmcore.com/fr/roi-calculator.html" />
    <link rel="alternate" hreflang="en" href="https://dcmcore.com/en/roi-calculator.html" />
    <link rel="alternate" hreflang="x-default" href="https://dcmcore.com/fr/roi-calculator.html" />
</head>
<body>
<div class="roi-widget">
<div class="widget-title">ROI Tokenisation Monitor</div>
<div class="input-group">
<label>Volume d'Émission Annuel (€)</label>
<div style="display:flex; justify-content:space-between; margin-bottom:5px;">
<span>1M€</span>
<span id="volumeVal" style="color:var(--accent); font-weight:700;">500M€</span>
<span>1B€</span>
</div>
<input class="slider" id="volumeSlider" max="1000" min="1" type="range" value="500"/>
</div>
<div class="input-group">
<label>Complexité Opérationnelle</label>
<div style="display:flex; justify-content:space-between; margin-bottom:5px;">
<span>Low</span>
<span id="compVal" style="color:var(--accent); font-weight:700;">Standard</span>
<span>High</span>
</div>
<input class="slider" id="compSlider" max="3" min="1" type="range" value="2"/>
</div>
<div class="result-panel">
<div class="result-item">
<span class="result-label">Coût Trad.</span>
<span class="result-val" id="tradCost">--</span>
</div>
<div class="result-item">
<span class="result-label">Coût DLT</span>
<span class="result-val" id="dltCost" style="color:#10b981;">--</span>
</div>
<div class="savings-badge" id="savingsLine">Économie Potentielle : --</div>
</div>
<p style="font-size:10px; color:var(--muted); text-align:center; margin-top:20px;">
            * Basé sur les benchmarks DCM 2026. Inclut Settlement, Custody et Reporting.
        </p>
</div>
<script>
        const vSlider = document.getElementById('volumeSlider');
        const cSlider = document.getElementById('compSlider');
        const vVal = document.getElementById('volumeVal');
        const cLabels = ["Low", "Standard", "High"];
        const tradCostEl = document.getElementById('tradCost');
        const dltCostEl = document.getElementById('dltCost');
        const savingsEl = document.getElementById('savingsLine');

        function calculate() {
            const vol = parseInt(vSlider.value);
            const comp = parseInt(cSlider.value);

            vVal.textContent = vol >= 1000 ? "1B€+" : vol + "M€";
            document.getElementById('compVal').textContent = cLabels[comp - 1];

            // Formula Logic (Heuristic)
            const tradIdx = vol * (0.005 + (comp * 0.002)); // 0.5% - 1.1%
            const dltIdx = vol * (0.002 + (comp * 0.0005)); // 0.2% - 0.35%

            const tradTotal = (tradIdx * 1000000).toLocaleString('fr-FR', { style: 'currency', currency: 'EUR', maximumFractionDigits: 0 });
            const dltTotal = (dltIdx * 1000000).toLocaleString('fr-FR', { style: 'currency', currency: 'EUR', maximumFractionDigits: 0 });

            const savings = Math.round(((tradIdx - dltIdx) / tradIdx) * 100);

            tradCostEl.textContent = tradTotal;
            dltCostEl.textContent = dltTotal;
            savingsEl.textContent = `Économie Potentielle : ${savings}% / an`;
        }

        vSlider.addEventListener('input', calculate);
        cSlider.addEventListener('input', calculate);
        calculate();
    </script>
</body>
</html>
