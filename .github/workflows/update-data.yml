name: Weekly Telemetry & Freshness Engine

on:
  schedule:
    # Run every Monday at 9:00 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:
    # Allow manual triggering

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run update script
        run: python update_treasuries.py
      - name: Commit if changed
        run: |
          git config user.name "DCM Core Bot"
          git config user.email "bot@dcmcore.com"
          git diff --quiet || (git add data/ en/observatory/ fr/observatory/ js/ && git commit -m "data: weekly treasury AUM refresh $(date -u +%Y-%m-%d)" && git push)
