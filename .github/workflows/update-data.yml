name: Weekly Telemetry & Freshness Engine

on:
  schedule:
    # Run every Monday at 9:00 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:
    # Allow manual triggering

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Telemetry Refresh Script
        run: python update_treasuries.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "DCM Core Bot"
          git config --global user.email "dcmcoreinstitute@gmail.com"
          git add data/tokenized-treasuries.json en/observatory/tokenized-markets.html fr/observatory/tokenized-markets.html js/api-docs-engine.js
          if ! git diff --cached --quiet; then
            git commit -m "cron(data): automated weekly refresh of tokenized treasuries telemetry [skip ci]"
            git push origin main
          else
            echo "No changes in telemetry data to commit."
          fi
