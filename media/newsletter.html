<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <meta
        content="Subscribe to DCM Policy Intelligence. The monthly briefing for decision-makers in digital assets and institutional finance."
        name="description" />
    <title>DCM Policy Intelligence | Newsletter Subscription</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com?display=swap" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800&display=swap"
        rel="stylesheet" />

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet" />

    <!-- Stylesheets -->
    <link href="../fr/styles.css" rel="stylesheet" />
    <link href="../fr/styles-navigation.css" rel="stylesheet" />

    <style>
        body {
            background-color: #020617;
            color: white;
            font-family: 'Inter', sans-serif;
            padding-top: 80px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .newsletter-hero {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 80px 20px;
            background: radial-gradient(circle at center, rgba(30, 41, 59, 0.4), transparent);
        }

        .subscription-box {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 60px;
            max-width: 600px;
            width: 100%;
            text-align: center;
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.8);
        }

        .newsletter-icon {
            font-size: 40px;
            color: #c9a84c;
            margin-bottom: 30px;
        }

        .newsletter-title {
            font-family: 'Outfit', sans-serif;
            font-size: 36px;
            font-weight: 800;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #fff, #94a3b8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .newsletter-tagline {
            color: #94a3b8;
            font-size: 16px;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .form-group input {
            width: 100%;
            background: rgba(2, 6, 23, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 12px;
            color: white;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #c9a84c;
        }

        .subscribe-btn {
            width: 100%;
            background: #c9a84c;
            color: #020617;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }

        .subscribe-btn:hover {
            background: #d4b96a;
            transform: translateY(-2px);
        }

        .trust-badges {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            gap: 20px;
            font-size: 12px;
            color: #64748b;
        }

        .trust-badge i {
            margin-right: 5px;
            color: #10b981;
        }
    </style>
</head>

<body>
    <header class="app-header simplified-header">
        <div class="header-logo" style="cursor: pointer;" onclick="window.location.href='../en/index.html'">
            <div class="logo-orb"></div>
            <span class="logo-text">DCM <span style="font-weight: 300;">Core</span></span>
        </div>
    </header>

    <div class="newsletter-hero">
        <div class="subscription-box">
            <div class="newsletter-icon">
                <i class="fas fa-paper-plane"></i>
            </div>
            <h1 class="newsletter-title">DCM Policy Intelligence</h1>
            <p class="newsletter-tagline">
                Join 5,000+ institutional researchers, regulators, and digital asset leads.
                Receive our monthly high-density briefing on systemic risk and regulatory shifts.
            </p>

            <form action="#" id="newsletterForm">
                <div class="form-group">
                    <label>Professional Email</label>
                    <input type="email" placeholder="name@institution.com" required>
                </div>
                <div class="form-group">
                    <label>Areas of Interest</label>
                    <input type="text" placeholder="e.g. MiCA, RWA, CBDC">
                </div>
                <button type="submit" class="subscribe-btn">Subscribe to Intelligence</button>
            </form>

            <div class="trust-badges">
                <div class="trust-badge"><i class="fas fa-shield-check"></i> Zero Spam</div>
                <div class="trust-badge"><i class="fas fa-user-secret"></i> Highly Technical</div>
            </div>
        </div>
    </div>

    <!-- Script to integrate with Supabase capture if needed -->
    <script src="../js/lead-capture.js"></script>
    <script>
        // Simple success handling
        document.getElementById('newsletterForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.textContent = "Subscription Confirmed";
            btn.style.background = "#10b981";
            btn.disabled = true;
        });
    </script>
</body>

</html>
